name: Update lazydocker binary

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      version:
        description: "Resolved lazydocker version"
        value: ${{ jobs.update.outputs.version }}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and unpack latest lazydocker
        run: bash ./scripts/update_lazydocker.sh

      - name: Commit and push changes
        run: |
          git add -A binaries

          if git diff --cached --quiet; then
            echo "No changes in binaries directory."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update lazydocker binary"
          git pull --no-rebase origin main
          git push

      - name: Detect resolved version
        id: detect_version
        if: always()
        run: |
          version="$(find binaries -maxdepth 1 -type f -name 'lazydocker.v*' ! -name '*.md5' -printf '%f\n' 2>/dev/null | sed 's#^lazydocker\.##' | sort -V | tail -n 1)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
