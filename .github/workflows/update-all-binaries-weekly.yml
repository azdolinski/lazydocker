name: 🚀 Update all binaries weekly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: write

concurrency:
  group: binaries-weekly-update
  cancel-in-progress: false

jobs:
  update-lazydocker:
    uses: ./.github/workflows/update-lazydocker.yml

  update-htop:
    needs: update-lazydocker
    if: always()
    uses: ./.github/workflows/update-htop.yml

  update-nano:
    needs: update-htop
    if: always()
    uses: ./.github/workflows/update-nano.yml

  update-docker-compose:
    needs: update-nano
    if: always()
    uses: ./.github/workflows/update-docker-compose.yml

  summary:
    needs:
      - update-lazydocker
      - update-htop
      - update-nano
      - update-docker-compose
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 📋 Summary
        run: |
          invoked_at="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          planned_next_run="$(date -u -d 'next sunday 03:00' '+%Y-%m-%d %H:%M:%S UTC')"

          echo "## 🚀 Weekly binaries update summary" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "🕒 invoked at: ${invoked_at}" >> "${GITHUB_STEP_SUMMARY}"
          echo "📅 next planned run: ${planned_next_run}" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "- 🐳 lazydocker: ${{ needs.update-lazydocker.result }} (version: ${{ needs.update-lazydocker.outputs.version || 'unknown' }})" >> "${GITHUB_STEP_SUMMARY}"
          echo "- 📊 htop: ${{ needs.update-htop.result }} (version: ${{ needs.update-htop.outputs.version || 'unknown' }})" >> "${GITHUB_STEP_SUMMARY}"
          echo "- ✍️ nano: ${{ needs.update-nano.result }} (version: ${{ needs.update-nano.outputs.version || 'unknown' }})" >> "${GITHUB_STEP_SUMMARY}"
          echo "- 🧩 docker-compose: ${{ needs.update-docker-compose.result }} (version: ${{ needs.update-docker-compose.outputs.version || 'unknown' }})" >> "${GITHUB_STEP_SUMMARY}"

      - name: 🚨 Fail workflow if any updater failed
        run: |
          failed=""

          if [[ "${{ needs.update-lazydocker.result }}" != "success" ]]; then
            failed="${failed} lazydocker"
          fi

          if [[ "${{ needs.update-htop.result }}" != "success" ]]; then
            failed="${failed} htop"
          fi

          if [[ "${{ needs.update-nano.result }}" != "success" ]]; then
            failed="${failed} nano"
          fi

          if [[ "${{ needs.update-docker-compose.result }}" != "success" ]]; then
            failed="${failed} docker-compose"
          fi

          if [[ -n "${failed}" ]]; then
            echo "Failed updaters:${failed}"
            exit 1
          fi
